<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cheating karenge - Secured</title>
    <style>
        /* Modern CSS Variables */
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F8FAFC;
            --sidebar-bg: #FFFFFF;
            --text-dark: #0F172A;
            --text-light: #64748B;
            --border: #E2E8F0;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        /* --- Login Screen UI --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .login-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .login-card h2 { margin-bottom: 0.5rem; color: var(--primary); }
        .login-card p { color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .login-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; outline: none; text-align: center; }
        .login-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 0.75rem; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .login-btn:hover { background-color: var(--primary-hover); }
        #error-msg { color: #EF4444; font-size: 0.85rem; margin-top: 1rem; display: none; }

        /* --- Main App Layout --- */
        #app-container { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 320px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 1.4rem; color: var(--primary); display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
        .search-box { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; background-color: var(--bg-color); }
        .search-box:focus { border-color: var(--primary); background-color: #fff; }
        .index-container { flex: 1; overflow-y: auto; padding: 1rem; }
        .index-container::-webkit-scrollbar { width: 6px; }
        .index-container::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        .category-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin: 1.5rem 0 0.5rem 0.5rem; font-weight: 600; }
        .category-title:first-child { margin-top: 0; }
        .subject-btn { background: transparent; border: none; width: 100%; text-align: left; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.95rem; color: var(--text-dark); display: flex; align-items: center; gap: 10px; transition: all 0.2s; margin-bottom: 2px; }
        .subject-btn:hover { background-color: #EFF6FF; color: var(--primary); }
        .subject-btn.active { background-color: var(--primary); color: white; font-weight: 500; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 1.5rem; position: relative; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text-light); }
        .welcome-screen h2 { font-size: 2rem; color: var(--text-dark); margin-bottom: 0.5rem; }
        .pdf-wrapper { display: none; flex: 1; background: #fff; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
        
        .pdf-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .pdf-header h2 { font-size: 1.2rem; }
        
        /* New Download Button Styles */
        .download-btn {
            background-color: #F1F5F9;
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        iframe { flex: 1; width: 100%; border: none; background-color: #e5e5e5; }

        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            .sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { padding: 0.5rem; height: 60vh; }
            .download-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Cheating karta hai tu, Password bta phir</h2>
            <p>Enter password to access notes</p>
            <input type="password" id="password-input" class="login-input" placeholder="Password">
            <button onclick="checkPassword()" class="login-btn">Unlock farrah</button>
            <p id="error-msg">Incorrect password. Try again.</p>
        </div>
    </div>

    <div id="app-wrapper" style="display: none;">
        <div id="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h1>Cheating Hub</h1>
                    <input type="text" id="search-input" class="search-box" placeholder="Search subjects...">
                </div>
                <div class="index-container" id="index-container"></div>
            </div>

            <div class="main-content">
                <div class="welcome-screen" id="welcome-screen">
                    <h2>Welcome to Cheating Hub</h2>
                    <p>Select a subject from the index on the left to start reading.</p>
                </div>
                <div class="pdf-wrapper" id="pdf-wrapper">
                    <div class="pdf-header">
                        <h2 id="pdf-title">Subject Title</h2>
                        <a id="download-btn" href="#" target="_blank" download class="download-btn">
                            ⬇ Download Code
                        </a>
                    </div>
                    <iframe id="pdf-iframe" src=""></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Password Logic ---
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const mySecretPassword = "vstandsforiet"; // Change this!

            if (input === mySecretPassword) {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('app-wrapper').style.display = "block";
                document.getElementById('app-container').style.display = "flex";
                renderIndex();
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });


        // --- App Logic ---
        const noteDatabase = {
            "Semester 1 - PPS": [
                { id: 1, name: "Write a C program to perform simple arithmetic operations.", viewFile: "practical.pdf", downloadFile: "simple_sum.c" },
                { id: 2, name: "Write a C Program to perform arithmetic mean and average.", viewFile: "exp2.pdf", downloadFile: "avg.c" },
                { id: 3, name: "Write a C program to convert the temperature from Fahrenheit to Centigrade and vice versa.", viewFile: "exp3.pdf", downloadFile: "fah2c.c" },
                { id: 4, name: "Write a C program to swap value of two number with thrid variable.", viewFile: "exp4.pdf", downloadFile: "SWAP.c" },
                { id: 5, name: "Write a C program to swap value of two number without thrid variable.", viewFile: "exp5.pdf", downloadFile: "swap2.c" },
                { id: 6, name: "Write a C program to find area of triangle, square,and circle.", viewFile: "exp6.pdf", downloadFile: "area.c" },
                { id: 7, name: "Write a C program to find even or odd no.", viewFile: "exp7.pdf", downloadFile: "odd_even.c" },
                { id: 8, name: "Write a C program to check wheather its leap year or not.", viewFile: "exp8.pdf", downloadFile: "LEAP_YEA.c" },
                { id: 9, name: "Write a C program to find greatest number amongs them.", viewFile: "exp9.pdf", downloadFile: "greatest.c" },
                { id: 10, name: "Write a C program to obtain grade of student.", viewFile: "exp10.pdf", downloadFile: "grade.c" },
                { id: 11, name: "Write a C program to print day of the week using switch case.", viewFile: "exp11.pdf", downloadFile: "days.c" },
                { id: 12, name: "Write a C program to select operator for operation using switch case.", viewFile: "exp12.pdf", downloadFile: "exp12_code.c" },
                { id: 13, name: "Write a C program to find the obtain grade using switch case.", viewFile: "exp13.pdf", downloadFile: "exp13_code.c" },
                { id: 14, name: "Write a C program to raise the maximum to the power of another number.", viewFile: "exp14.pdf", downloadFile: "exp14_code.c" },
                { id: 15, name: "Write a C program to to compute the factorial of given no.", viewFile: "exp15.pdf", downloadFile: "FACT.c" },
                { id: 16, name: "Write a C program to check whether the given is prime or not.", viewFile: "exp16.pdf", downloadFile: "Prime.c" },
                { id: 17, name: "Write a C program to that genearte the fibonanci series.", viewFile: "exp17.pdf", downloadFile: "FIBONACI.c" },
                { id: 18, name: "Write a C program to reverse the number.", viewFile: "exp18.pdf", downloadFile: "REVERSE.c" },
                { id: 19, name: "Write a C program to check whether the given number is a palindrome number.", viewFile: "exp19.pdf", downloadFile: "palindrome.c" },
                { id: 20, name: "Write a C program to the sum of individual digits of a given number.", viewFile: "exp20.pdf", downloadFile: "SUM.c" },
                { id: 21, name: "Write a C program to check whether the given number is an Armstrong number.", viewFile: "exp21.pdf", downloadFile: "ARMSTRONG.c" },
                { id: 22, name: "Write a C program to print right angles triangle of asterisks using nestes loop.", viewFile: "exp22.pdf", downloadFile: "STAR.c" },
                { id: 23, name: "Write a C program to print pyramid pattern of asterisks using nestes loop.", viewFile: "exp23.pdf", downloadFile: "STAR_CEN.c" },
                { id: 24, name: "Write a C program to print a pattern of alphabets using nestes loop", viewFile: "exp24.pdf", downloadFile: "ALPHA.c" },
                { id: 25, name: "Write a C program to to read ‘n’ numbers and to find the maximum and minimum value.", viewFile: "exp25.pdf", downloadFile: "ARRAYS.c" },
                { id: 26, name: "Write a C program to numbers and to search a particular element in that array.", viewFile: "exp26.pdf", downloadFile: "FIND_THE.c" },
                { id: 27, name: "Write a C program to program to perform matrix addition.", viewFile: "exp27.pdf", downloadFile: "MATRIX.c" },
                { id: 28, name: "Write a C program to find factorial of a number using recursion.", viewFile: "exp28.pdf", downloadFile: "FACT_R.c" },
                { id: 29, name: "Write a C program to Swap Two values using call by reference.", viewFile: "exp29.pdf", downloadFile: "POINTER.c" },
                { id: 30, name: "Write a C program Design array of structure emp with the elements empno, name, address, phone_no..", viewFile: "exp30.pdf", downloadFile: "ST.c" },
                { id: 31, name: "Create a menu driven program that takes the user input and store it into the file and reads it back.", viewFile: "exp31.pdf", downloadFile: "FOPEN.c" },
                { id: 32, name: "Write a menu driven C program to simulate the copy, reverse and concat string functions", viewFile: "exp32.pdf", downloadFile: "STRNG.c" }
            ]
        };

        const indexContainer = document.getElementById('index-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const pdfWrapper = document.getElementById('pdf-wrapper');
        const pdfIframe = document.getElementById('pdf-iframe');
        const pdfTitle = document.getElementById('pdf-title');
        const searchInput = document.getElementById('search-input');
        const downloadBtn = document.getElementById('download-btn'); 

        function renderIndex(filterText = "") {
            indexContainer.innerHTML = ""; 
            for (const [category, subjects] of Object.entries(noteDatabase)) {
                const filteredSubjects = subjects.filter(sub => 
                    sub.name.toLowerCase().includes(filterText.toLowerCase())
                );
                if (filteredSubjects.length > 0) {
                    const categoryTitle = document.createElement('div');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category;
                    indexContainer.appendChild(categoryTitle);

                    filteredSubjects.forEach(subject => {
                        const btn = document.createElement('button');
                        btn.className = 'subject-btn';
                        btn.innerHTML = `📄 ${subject.name}`;
                        
                        // Pass the file URL to the function when clicked
                        btn.onclick = () => openPDF(btn, subject.name, subject.viewFile, subject.downloadFile);
                        indexContainer.appendChild(btn);
                    });
                }
            }
        }

        function openPDF(buttonElement, title, viewUrl, downloadUrl) {
            // 1. Highlight the active button
            document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
            buttonElement.classList.add('active');
            
            // 2. Hide the welcome screen and show the PDF viewer
            welcomeScreen.style.display = 'none';
            pdfWrapper.style.display = 'flex';
            pdfTitle.textContent = title;
            
            // 3. Set the viewer to show the FIRST file (for reading online)
            pdfIframe.src = viewUrl; 
            
            // 4. Set the download button to trigger the SECOND file (for saving)
            downloadBtn.href = downloadUrl;
            
            // 5. Tell the browser what to name the file when downloaded (keeps the original .c filename)
            downloadBtn.download = downloadUrl;
        }        

        searchInput.addEventListener('input', (e) => { renderIndex(e.target.value); });
    </script>
</body>

</html>
